<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Controle Financeiro</h1>
      <p>Gestão de gastos pessoais e familiares</p>
    </header>

    <section class="resumo">
      <div class="card receita">
        <h2>Receitas</h2>
        <p id="totalReceitas">R$ 0,00</p>
      </div>

      <div class="card despesa">
        <h2>Despesas</h2>
        <p id="totalDespesas">R$ 0,00</p>
      </div>

      <div class="card saldo">
        <h2>Saldo</h2>
        <p id="saldoFinal">R$ 0,00</p>
      </div>
    </section>

    <section class="formulario">
      <h2>Nova Movimentação</h2>

      <form id="formMovimentacao">
        <input type="text" id="descricao" placeholder="Descrição" required>

        <input type="number" id="valor" placeholder="Valor" step="0.01" min="0.01" required>

        <select id="tipo" required>
          <option value="">Tipo</option>
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
        </select>

        <select id="categoria" required>
          <option value="">Categoria</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Moradia">Moradia</option>
          <option value="Transporte">Transporte</option>
          <option value="Lazer">Lazer</option>
          <option value="Streaming">Streaming</option>
          <option value="Saúde">Saúde</option>
          <option value="Salário">Salário</option>
          <option value="Outros">Outros</option>
        </select>

        <select id="pagamento" required>
          <option value="">Forma de Pagamento</option>
          <option value="Cartão">Cartão</option>
          <option value="Pix">Pix</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="Boleto">Boleto</option>
        </select>

        <button type="submit">Adicionar</button>
      </form>
    </section>

    <section class="lista">
      <h2>Movimentações</h2>
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Pagamento</th>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="listaMovimentacoes">
        </tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
